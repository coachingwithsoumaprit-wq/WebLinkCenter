<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="me.png" type="image/png">
    <title>Soumaprit Paul</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #181818 25%, #111111 25%, #111111 50%, #181818 50%, #181818 75%, #111111 75%, #111111 100%);
            background-size: 60px 60px;
            animation: moveBg 4s linear infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 15px;
            position: relative; 
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        /* --- Top Action Buttons (Admin & Back) --- */
        .top-btn {
            position: absolute; top: 20px; width: 45px; height: 45px;
            background-color: rgba(255, 255, 255, 0.1); color: #ffffff; display: flex;
            align-items: center; justify-content: center; border-radius: 50%;
            font-size: 18px; border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease; z-index: 100; cursor: pointer; text-decoration: none;
        }
        .top-btn:hover { transform: scale(1.1) rotate(5deg); background-color: rgba(255, 255, 255, 0.25); }
        
        .back-link { left: 20px; }
        .admin-toggle-link { right: 20px; }

        .container { width: 100%; max-width: 520px; text-align: center; margin-top: 20px; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
        .name { font-size: 22px; font-weight: 700; margin: 15px 0 5px 0; }
        .bio { font-size: 15px; color: #b3b3b3; margin-bottom: 25px; }
        
        .social-icons { display: flex; justify-content: center; gap: 18px; margin-bottom: 30px; }
        .social-icons a { font-size: 28px; text-decoration: none; transition: transform 0.2s; }
        .social-icons a:hover { transform: scale(1.2); }
        .icon-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-fb { color: #1877F2; }
        .icon-wa { color: #25D366; }
        .icon-yt { color: #FF0000; }
        .icon-tg { color: #229ED9; }

        /* --- Product Card & Preview Box --- */
        .product-list { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }
        .product-card:hover { transform: translateY(-3px); border-color: rgba(255, 255, 255, 0.3); }

        .preview-box {
            width: 160px;
            height: 110px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            flex-shrink: 0;
        }
        .preview-box iframe {
            width: 480px;
            height: 330px;
            border: none;
            transform: scale(0.333);
            transform-origin: 0 0;
            pointer-events: none;
        }

        .product-info { flex-grow: 1; text-align: left; }
        .product-name { font-size: 17px; font-weight: 600; margin-bottom: 10px; color: #fff; }
        
        .btn-group { display: flex; gap: 8px; align-items: center; }
        .product-btn {
            display: inline-block;
            padding: 8px 14px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .product-btn:hover { background: #0056b3; }

        .share-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .share-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        /* --- Modal Styles --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #222; padding: 25px; border-radius: 12px;
            width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .modal-close { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; color: #aaa; }
        .modal-input {
            width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px;
            border: 1px solid #444; background: #111; color: #fff; font-size: 14px;
        }
        .modal-btn {
            width: 100%; padding: 10px; background: #28a745; color: #fff;
            border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 5px;
        }
        .modal-btn:hover { background: #218838; }

        /* Admin Manage Products List */
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #333; padding: 8px 12px; margin-top: 8px; border-radius: 6px; 
        }
        .admin-item-actions { display: flex; gap: 10px; }
        .action-btn { cursor: pointer; border: none; background: none; font-size: 16px; }
        .edit-btn { color: #ffc107; }
        .delete-btn { color: #dc3545; }
    </style>
</head>
<body>

    <!-- Left Top Back Button -->
    <div class="top-btn back-link" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </div>

    <!-- Right Top Admin Lock Button -->
    <div class="top-btn admin-toggle-link" onclick="openLoginModal()" title="Admin Login">
        <i class="fas fa-lock" id="lock-icon"></i>
    </div>

    <!-- Main Public View -->
    <div class="container" id="public-main-view">
        <div class="profile-container">
            <img src="me.png" alt="Profile" class="profile-img">
        </div>
        
        <div class="name">Soumaprit Paul</div>
        <div class="bio">Welcome to my Link Center 🚀</div>

        <div class="social-icons">
            <a href="https://www.instagram.com/coachingwithsoumaprit?igsh=c2RpM3FldGFwd3I4" class="icon-ig" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1ARYAzyNkx/" class="icon-fb" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://whatsapp.com/channel/0029Vb8F9in0VycH9g54312X" class="icon-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://youtube.com/@coachingwithsoumaprit?si=nSajrPn4nBo5U8Bf" class="icon-yt" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://t.me/+w0RrVtFXZA45ZTM1" class="icon-tg" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>

        <!-- Product Cards Area -->
        <div class="product-list" id="productList"></div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLoginModal()">&times;</span>
            <h3>Admin Login</h3>
            <input type="password" id="adminPassword" class="modal-input" placeholder="Enter Admin Password">
            <button class="modal-btn" onclick="verifyPassword()">Login</button>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAdminModal()">&times;</span>
            <h3 id="formTitle">Add Product</h3>
            
            <input type="hidden" id="editIndex" value="-1">
            
            <input type="text" id="prodName" class="modal-input" placeholder="Product Name">
            <input type="url" id="prodLink" class="modal-input" placeholder="Product / Webpage Link">
            <button class="modal-btn" id="saveBtn" onclick="saveProduct()">Add Product</button>

            <h4 style="margin-top:20px; text-align:left;">Manage Products</h4>
            <div id="adminProductList"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "1019";
        let products = JSON.parse(localStorage.getItem('myProducts')) || [];

        function goBack() {
            window.history.back();
        }

        // Product Specific Share Function
        function shareLink(name, url) {
            if (navigator.share) {
                navigator.share({
                    title: name,
                    url: url
                }).catch(err => console.log('Error sharing:', err));
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Product link copied to clipboard!');
                }).catch(() => {
                    alert('Failed to copy link.');
                });
            }
        }

        function renderProducts() {
            const list = document.getElementById('productList');
            const adminList = document.getElementById('adminProductList');
            list.innerHTML = '';
            adminList.innerHTML = '';

            products.forEach((prod, index) => {
                // Public View Rendering with Share Button
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="preview-box">
                        <iframe src="${prod.link}" title="preview"></iframe>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${prod.name}</div>
                        <div class="btn-group">
                            <a href="${prod.link}" class="product-btn" target="_blank">View Project</a>
                            <button class="share-btn" onclick="shareLink('${prod.name.replace(/'/g, "\\'")}', '${prod.link}')" title="Share Product Link">
                                <i class="fas fa-share-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(card);

                // Admin Manage List Rendering
                const adminItem = document.createElement('div');
                adminItem.className = 'admin-item';
                adminItem.innerHTML = `
                    <span>${prod.name}</span>
                    <div class="admin-item-actions">
                        <button class="action-btn edit-btn" onclick="editProduct(${index})" title="Edit"><i class="fas fa-edit"></i></button>
                        <button class="action-btn delete-btn" onclick="deleteProduct(${index})" title="Delete"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                adminList.appendChild(adminItem);
            });
        }

        // Modal Controls
        function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        
        function verifyPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASS) {
                closeLoginModal();
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminModal').style.display = 'flex';
            } else {
                alert('Wrong Password!');
            }
        }

        function closeAdminModal() { 
            document.getElementById('adminModal').style.display = 'none'; 
            resetForm();
        }

        // Save / Add / Update Product
        function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            const link = document.getElementById('prodLink').value.trim();
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (name && link) {
                if (editIndex === -1) {
                    products.push({ name, link });
                } else {
                    products[editIndex] = { name, link };
                }
                localStorage.setItem('myProducts', JSON.stringify(products));
                resetForm();
                renderProducts();
            } else {
                alert('Please enter both name and link.');
            }
        }

        // Populate fields for Editing
        function editProduct(index) {
            document.getElementById('formTitle').innerText = "Edit Product";
            document.getElementById('prodName').value = products[index].name;
            document.getElementById('prodLink').value = products[index].link;
            document.getElementById('editIndex').value = index;
            document.getElementById('saveBtn').innerText = "Update Product";
            document.getElementById('saveBtn').style.background = "#ffc107";
            document.getElementById('saveBtn').style.color = "#000";
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = "Add Product";
            document.getElementById('prodName').value = '';
            document.getElementById('prodLink').value = '';
            document.getElementById('editIndex').value = "-1";
            document.getElementById('saveBtn').innerText = "Add Product";
            document.getElementById('saveBtn').style.background = "#28a745";
            document.getElementById('saveBtn').style.color = "#fff";
        }

        function deleteProduct(index) {
            if(confirm("Are you sure you want to delete this product?")) {
                products.splice(index, 1);
                localStorage.setItem('myProducts', JSON.stringify(products));
                resetForm();
                renderProducts();
            }
        }

        // Initial Load
        renderProducts();
    </script>
</body>
</html>
