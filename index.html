<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="me.png" type="image/png">
    <title>Soumaprit Paul</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #181818 25%, #111111 25%, #111111 50%, #181818 50%, #181818 75%, #111111 75%, #111111 100%);
            background-size: 60px 60px;
            animation: moveBg 4s linear infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        .container { width: 100%; max-width: 430px; text-align: center; }

        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.1); }
        .name { font-size: 24px; font-weight: 700; margin: 15px 0 5px 0; }
        .bio { font-size: 16px; color: #e0e0e0; margin-bottom: 20px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .social-icons a { font-size: 32px; text-decoration: none; transition: transform 0.2s; }
        .icon-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-fb { color: #1877F2; }
        .icon-wa { color: #25D366; }
        .icon-yt { color: #FF0000; }
        .icon-tg { color: #229ED9; }

        .links-container { display: flex; flex-direction: column; gap: 16px; width: 100%; }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            color: #121212;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .link-content { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-decoration: none; 
            color: inherit; 
            flex-grow: 1; 
            cursor: pointer;
        }
        
        .link-btn img { width: 60px; height: 40px; border-radius: 6px; object-fit: cover; }
        
        .download-btn {
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        .download-btn:hover { background-color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <img src="me.png" alt="Prince Garg" class="profile-img">
        </div>
        
        <div class="name">Soumaprit Paul</div>
        <div class="bio">Welcome to my Link Center 🚀</div>

        <div class="social-icons">
            <a href="https://www.instagram.com/coachingwithsoumaprit?igsh=c2RpM3FldGFwd3I4" class="icon-ig" target="_blank">
                <i class="fab fa-instagram"></i></a>

            <a href="https://www.facebook.com/share/1ARYAzyNkx/" class="icon-fb" target="_blank">
                <i class="fab fa-facebook"></i></a>

            <a href="https://whatsapp.com/channel/0029Vb8F9in0VycH9g54312X" class="icon-wa" target="_blank">
                <i class="fab fa-whatsapp"></i></a>

            <a href="https://youtube.com/@coachingwithsoumaprit?si=nSajrPn4nBo5U8Bf" class="icon-yt" target="_blank">
                <i class="fab fa-youtube"></i></a>

            <a href="https://t.me/+w0RrVtFXZA45ZTM1" class="icon-tg" target="_blank">
                <i class="fab fa-telegram"></i></a>
        </div>

        <div class="links-container" id="links-container">
            <p style="color: #ccc; font-size: 14px;">Loading products...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-FPX1xPTQ8NTER4nFJH0jSTRmRB_K0FE",
            authDomain: "weblinkcenter-db120.firebaseapp.com",
            projectId: "weblinkcenter-db120",
            storageBucket: "weblinkcenter-db120.firebasestorage.app",
            messagingSenderId: "394449406925",
            appId: "1:394449406925:web:4ec45b9894ad4640361284"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const container = document.getElementById('links-container');

        // গুরুত্বপূর্ণ: "products" লেখাটি আপনার অ্যাডমিন প্যানেলের কালেকশন নামের সাথে মিলতে হবে
        onSnapshot(collection(db, "products"), (snapshot) => {
            container.innerHTML = ""; 
            
            if (snapshot.empty) {
                container.innerHTML = '<p style="color: #ccc; font-size: 14px;">No products found!</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                <div class="link-btn">
                    <a href="${data.openLink || '#'}" class="link-content" target="_blank">
                        <img src="${data.image || 'https://via.placeholder.com/60x40'}" alt="Icon">
                        <span>${data.name || 'No Name'}</span>
                    </a>
                    <a href="${data.downloadLink || '#'}" class="download-btn" target="_blank">
                        <i class="fas fa-download"></i>
                    </a>
                </div>`;
            });
        }, (error) => {
            console.error("Error fetching data: ", error);
            container.innerHTML = '<p style="color: #ff4d4d; font-size: 14px;">Error loading data!</p>';
        });
    </script>

</body>
</html>
