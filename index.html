<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="me.png" type="image/png">
    <title>Soumaprit Paul</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #181818 25%, #111111 25%, #111111 50%, #181818 50%, #181818 75%, #111111 75%, #111111 100%);
            background-size: 60px 60px;
            animation: moveBg 4s linear infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        .container { width: 100%; max-width: 450px; text-align: center; }

        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.1); }
        .name { font-size: 24px; font-weight: 700; margin: 15px 0 5px 0; }
        .bio { font-size: 16px; color: #e0e0e0; margin-bottom: 20px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .social-icons a { font-size: 32px; text-decoration: none; transition: transform 0.2s; }
        .icon-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-fb { color: #1877F2; }
        .icon-wa { color: #25D366; }
        .icon-yt { color: #FF0000; }
        .icon-tg { color: #229ED9; }

        .links-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }

        /* Product Card Design */
        .product-wrapper {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #121212;
            font-weight: 600;
        }

        .link-content { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-decoration: none; 
            color: inherit; 
            flex-grow: 1; 
            cursor: pointer;
        }
        
        .link-btn img { width: 60px; height: 40px; border-radius: 6px; object-fit: cover; }
        
        .right-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-icon-btn {
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon-btn.share-btn { background-color: #1877F2; }
        .action-icon-btn:hover { opacity: 0.8; }

        /* Interaction Bar */
        .interaction-bar {
            display: flex;
            justify-content: center; /* সেন্টারে নেওয়া হয়েছে */
            gap: 30px;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 8px;
            color: #555;
            font-size: 13px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .action-btn:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-container">
            <img src="me.png" alt="Profile" class="profile-img">
        </div>
        
        <div class="name">Soumaprit Paul</div>
        <div class="bio">Welcome to my Link Center 🚀</div>

        <div class="social-icons">
            <a href="https://www.instagram.com/coachingwithsoumaprit?igsh=c2RpM3FldGFwd3I4" class="icon-ig" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1ARYAzyNkx/" class="icon-fb" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://whatsapp.com/channel/0029Vb8F9in0VycH9g54312X" class="icon-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://youtube.com/@coachingwithsoumaprit?si=nSajrPn4nBo5U8Bf" class="icon-yt" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://t.me/+w0RrVtFXZA45ZTM1" class="icon-tg" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>

        <div class="links-container" id="links-container">
            <p style="color: #ccc; font-size: 14px;">Loading products...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-FPX1xPTQ8NTER4nFJH0jSTRmRB_K0FE",
            authDomain: "weblinkcenter-db120.firebaseapp.com",
            projectId: "weblinkcenter-db120",
            storageBucket: "weblinkcenter-db120.firebasestorage.app",
            messagingSenderId: "394449406925",
            appId: "1:394449406925:web:4ec45b9894ad4640361284"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const container = document.getElementById('links-container');

        onSnapshot(collection(db, "products"), (snapshot) => {
            container.innerHTML = ""; 
            
            snapshot.forEach((documentSnapshot) => {
                const data = documentSnapshot.data();
                const docId = documentSnapshot.id;
                
                container.innerHTML += `
                <div class="product-wrapper">
                    <div class="link-btn">
                        <div class="link-content" onclick="viewProduct('${docId}', '${data.openLink || '#'}')">
                            <img src="${data.image || 'https://via.placeholder.com/60x40'}" alt="Icon">
                            <span>${data.name || 'No Name'}</span>
                        </div>
                        <div class="right-actions">
                            <button class="action-icon-btn share-btn" onclick="shareProduct('${data.name}', '${data.openLink}')" title="Share">
                                <i class="fas fa-share"></i>
                            </button>
                            <a href="${data.downloadLink || '#'}" class="action-icon-btn" target="_blank" title="Download">
                                <i class="fas fa-download"></i>
                            </a>
                        </div>
                    </div>
                    
                    <div class="interaction-bar">
                        <span><i class="fas fa-eye"></i> ${data.views || 0}</span>
                        <button class="action-btn" onclick="likeProduct('${docId}')"><i class="fas fa-heart" style="color:#ff4d4d;"></i> ${data.likes || 0}</button>
                    </div>
                </div>`;
            });
        });

        window.viewProduct = async (id, url) => {
            if(url && url !== '#') { window.open(url, '_blank'); }
            try { await updateDoc(doc(db, "products", id), { views: increment(1) }); } catch (e) {}
        };

        window.likeProduct = async (id) => {
            try { await updateDoc(doc(db, "products", id), { likes: increment(1) }); } catch (e) {}
        };

        window.shareProduct = async (title, url) => {
            const shareUrl = (url && url !== '#') ? url : window.location.href; 
            if (navigator.share) {
                navigator.share({ title: title, text: 'Check this out!', url: shareUrl }).catch(e => {});
            } else {
                navigator.clipboard.writeText(shareUrl).then(() => alert("লিংকটি কপি করা হয়েছে!"));
            }
        };
    </script>
</body>
</html>
