<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #181818 25%, #111111 25%, #111111 50%, #181818 50%, #181818 75%, #111111 75%, #111111 100%);
            background-size: 60px 60px;
            animation: moveBg 4s linear infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        .container { width: 100%; max-width: 430px; text-align: center; }

        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.1); }
        .name { font-size: 24px; font-weight: 700; margin: 15px 0 5px 0; }
        .bio { font-size: 16px; color: #e0e0e0; margin-bottom: 20px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .social-icons a { font-size: 32px; text-decoration: none; transition: transform 0.2s; }
        .icon-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-fb { color: #1877F2; }
        .icon-wa { color: #25D366; }
        .icon-yt { color: #FF0000; }
        .icon-tg { color: #229ED9; }

        .links-container { display: flex; flex-direction: column; gap: 16px; width: 100%; }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            color: #121212;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .link-content { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-decoration: none; 
            color: inherit; 
            flex-grow: 1; /* যাতে পুরো বাম দিকটা ক্লিকেবল হয় */
            cursor: pointer;
        }
        
        .link-btn img { width: 60px; height: 40px; border-radius: 6px; object-fit: cover; }
        
        /* Download Button style */
        .download-btn {
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        .download-btn:hover { background-color: #555; }
    </style>

  </head>
<body>

        <div class="social-icons">

                <i class="fab fa-instagram"></i></a>

            <a href="https://www.facebook.com/share/1ARYAzyNkx/" class="icon-fb">

            <a href="https://whatsapp.com/channel/0029Vb8F9in0VycH9g54312X" class="icon-wa">
                <i class="fab fa-whatsapp"></i></a>

            <a href="https://youtube.com/@coachingwithsoumaprit?si=nSajrPn4nBo5U8Bf" class="icon-yt">
                <i class="fab fa-youtube"></i></a>

            <a href="https://t.me/+w0RrVtFXZA45ZTM1" class="icon-tg">

        </div>

        <div class="links-container" id="links-container">
